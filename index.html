<script>
    function toggleSettings() {
        const s = document.getElementById('settings');
        s.style.display = s.style.display === 'none' ? 'block' : 'none';
    }

    function saveKey() {
        const key = document.getElementById('apiKey').value;
        localStorage.setItem('gemini_api_key', key);
        alert("Key saved! Your phone will remember this.");
        toggleSettings();
    }

    async function sendMessage() {
        const key = localStorage.getItem('gemini_api_key');
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');
        
        if (!key) {
            alert("Please save your API key in settings first!");
            return;
        }

        const message = input.value;
        chat.innerHTML += `<p><b>You:</b> ${message}</p>`;
        input.value = ""; // Clear the input

        try {
            // This is the courier 🏃‍♂️ sending your message to Gemini
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "initial/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: message }] }]
                })
            });

            const data = await response.json();
            const aiResponse = data.candidates[0].content.parts[0].text;
            
            chat.innerHTML += `<p><b>AI:</b> ${aiResponse}</p>`;
            chat.scrollTop = chat.scrollHeight; // Auto-scroll to bottom
        } catch (error) {
            chat.innerHTML += `<p style="color:red"><b>Error:</b> Could not reach Gemini. Check your key!</p>`;
        }
    }
    </script>
