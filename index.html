<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 3 Flash Preview Assistant</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 15px; margin-bottom: 10px; border-radius: 12px; background: #1e1e1e; display: flex; flex-direction: column; gap: 15px; border: 1px solid #333; }
        .msg { max-width: 80%; padding: 10px 14px 25px 14px; border-radius: 18px; line-height: 1.4; font-size: 15px; position: relative; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: #333; color: #e0e0e0; border-bottom-left-radius: 4px; }
        .timestamp { position: absolute; bottom: 5px; right: 12px; font-size: 10px; opacity: 0.6; }
        .ai-msg .timestamp { left: 12px; right: auto; }
        #attachmentBar { display: none; background: #252525; padding: 8px 12px; border-radius: 8px 8px 0 0; border: 1px solid #444; border-bottom: none; align-items: center; gap: 10px; }
        #settings { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: none; border: 1px solid #444; }
        .input-area { display: flex; gap: 8px; background: #252525; padding: 10px; border-radius: 0 0 8px 8px; border: 1px solid #444; }
        input[type="text"] { flex-grow: 1; background: #333; color: white; border: 1px solid #555; padding: 10px; border-radius: 8px; }
        button { padding: 10px 15px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <button onclick="toggleSettings()" style="background:#444; margin-bottom:10px; width:fit-content">⚙️ Settings</button>

    <div id="settings">
        <label>API Key:</label>
        <input type="password" id="apiKey" placeholder="Paste Gemini key here...">
        <button onclick="saveKey()">💾 Save</button>
    </div>

    <div id="chat"></div>

    <div id="attachmentBar">
        <span id="fileIcon">📄</span>
        <span id="fileName"></span>
        <button onclick="clearFile()" style="background:none; color:#ff4d4d; padding:0">✕</button>
    </div>

    <div class="input-area">
        <input type="file" id="fileInput" style="display:none" accept="image/*,.pdf,text/plain" onchange="handleFileSelect(this)">
        <button type="button" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="text" id="userInput" placeholder="Message Gemini 3...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        let chatHistory = [];
        let currentFileData = null;

        function toggleSettings() {
            const s = document.getElementById('settings');
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
        }

        function saveKey() {
            const key = document.getElementById('apiKey').value.trim();
            if(key) {
                localStorage.setItem('gemini_api_key', key);
                alert("Key saved!");
                toggleSettings();
            }
        }

        function handleFileSelect(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                currentFileData = {
                    mime_type: file.type,
                    data: e.target.result.split(',')[1]
                };
                document.getElementById('fileName').innerText = file.name;
                document.getElementById('fileIcon').innerText = file.type.includes('image') ? '🖼️' : '📄';
                document.getElementById('attachmentBar').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        }

        function clearFile() {
            currentFileData = null;
            document.getElementById('fileInput').value = "";
            document.getElementById('attachmentBar').style.display = 'none';
        }

        function getTimestamp() {
            return new Date().toLocaleString([], { hour: '2-digit', minute: '2-digit' });
        }

        async function sendMessage() {
            const key = localStorage.getItem('gemini_api_key');
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            
            if (!key) { alert("Please save your API key in Settings first!"); return; }
            if (!input.value && !currentFileData) return;

            const text = input.value;
            chat.innerHTML += `<div class="user-msg msg">${text || "<i>Sent an attachment</i>"}<span class="timestamp">${getTimestamp()}</span></div>`;
            
            let messageParts = [{ text: text || "Analyze this file." }];
            if (currentFileData) {
                messageParts.push({ inline_data: currentFileData });
            }

            chatHistory.push({ role: "user", parts: messageParts });
            input.value = "";
            clearFile();
            chat.scrollTop = chat.scrollHeight;

            try {
                // UPDATED MODEL NAME HERE 🛰️
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: chatHistory })
                });

                const data = await response.json();
                
                // Error handling check
                if (data.error) {
                    throw new Error(data.error.message);
                }

                const aiResponse = data.candidates[0].content.parts[0].text;
                chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });
                chat.innerHTML += `<div class="ai-msg msg">${aiResponse}<span class="timestamp">${getTimestamp()}</span></div>`;
            } catch (e) {
                // DEBUG LINE: Shows the actual error message in the chat 🐛
                chat.innerHTML += `<div class="ai-msg msg" style="color:#ff4d4d">Error: ${e.message}</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
