<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Assistant</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 15px; margin-bottom: 10px; border-radius: 12px; background: #1e1e1e; display: flex; flex-direction: column; gap: 15px; border: 1px solid #333; }
        .msg { max-width: 80%; padding: 10px 14px 25px 14px; border-radius: 18px; line-height: 1.4; font-size: 15px; position: relative; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: #333; color: #e0e0e0; border-bottom-left-radius: 4px; }
        .timestamp { position: absolute; bottom: 5px; right: 12px; font-size: 10px; opacity: 0.6; }
        .ai-msg .timestamp { left: 12px; right: auto; }
        #settings { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: none; border: 1px solid #444; }
        .input-area { display: flex; gap: 8px; background: #252525; padding: 10px; border-radius: 8px; border: 1px solid #444; align-items: center; }
        input[type="text"] { flex-grow: 1; background: #333; color: white; border: 1px solid #555; padding: 10px; border-radius: 8px; }
        select { background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 8px; cursor: pointer; }
        button { padding: 10px 15px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <button onclick="toggleSettings()" style="background:#444; margin-bottom:10px; width:fit-content">⚙️ Settings</button>

    <div id="settings">
        <label>Gemini API Key:</label>
        <input type="password" id="geminiKey" placeholder="Paste Gemini key...">
        <label style="display:block; margin-top:10px;">Claude API Key:</label>
        <input type="password" id="claudeKey" placeholder="Paste Claude key...">
        <button onclick="saveKeys()" style="margin-top:10px; width:100%">💾 Save Keys</button>
    </div>

    <div id="chat"></div>

    <div class="input-area">
        <select id="modelSelect">
            <option value="gemini">Gemini 3 Flash</option>
            <option value="claude">Claude 3.5 Sonnet</option>
        </select>
        <input type="text" id="userInput" placeholder="Ask anything...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        let chatHistory = []; // We'll keep history in Gemini's format as our "base"

        function toggleSettings() {
            const s = document.getElementById('settings');
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
        }

        function saveKeys() {
            localStorage.setItem('gemini_api_key', document.getElementById('geminiKey').value.trim());
            localStorage.setItem('claude_api_key', document.getElementById('claudeKey').value.trim());
            alert("Keys saved!");
            toggleSettings();
        }

        function getTimestamp() {
            return new Date().toLocaleString([], { hour: '2-digit', minute: '2-digit' });
        }

        async function sendMessage() {
            const model = document.getElementById('modelSelect').value;
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value;
            if (!text) return;

            // 1. Show user message
            chat.innerHTML += `<div class="user-msg msg">${text}<span class="timestamp">${getTimestamp()}</span></div>`;
            chatHistory.push({ role: "user", parts: [{ text: text }] });
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            // 2. Route the Request 🛰️
            let url, headers, body;
            
            if (model === "gemini") {
                const key = localStorage.getItem('gemini_api_key');
                url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`;
                headers = { "Content-Type": "application/json" };
                body = JSON.stringify({ contents: chatHistory });
            } else {
                // Claude Logic
                const key = localStorage.getItem('claude_api_key');
                url = `https://api.anthropic.com/v1/messages`;
                headers = {
                    "Content-Type": "application/json",
                    "x-api-key": key,
                    "anthropic-version": "2023-06-01",
                    "dangerously-allow-browser": "true"
                };
                // Translate history for Claude 🔄
                const claudeMessages = chatHistory.map(m => ({
                    role: m.role === "model" ? "assistant" : "user",
                    content: m.parts[0].text
                }));
                body = JSON.stringify({ model: "claude-3-5-sonnet-20240620", max_tokens: 1024, messages: claudeMessages });
            }

            try {
                const response = await fetch(url, { method: "POST", headers: headers, body: body });
                const data = await response.json();
                
                // 3. Unwrap the Response 📥
                let aiText = "";
                if (model === "gemini") {
                    aiText = data.candidates[0].content.parts[0].text;
                } else {
                    aiText = data.content[0].text;
                }

                chatHistory.push({ role: "model", parts: [{ text: aiText }] });
                chat.innerHTML += `<div class="ai-msg msg">${aiText}<span class="timestamp">${getTimestamp()}</span></div>`;
            } catch (e) {
                chat.innerHTML += `<div class="ai-msg msg" style="color:red">Error: Check your API keys or console.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
