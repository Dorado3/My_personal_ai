<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal AI</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #chat { flex-grow: 1; overflow-y: auto; border: 1px solid #333; padding: 10px; margin-bottom: 10px; border-radius: 8px; background: #1e1e1e; }
        #settings { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: none; border: 1px solid #444; }
        input, button { padding: 12px; border-radius: 5px; border: none; width: 100%; box-sizing: border-box; margin-top: 5px; font-size: 16px; }
        input { background: #333; color: white; border: 1px solid #555; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        .key-btn { background: #444; margin-bottom: 10px; width: auto; align-self: flex-start; padding: 8px 15px; }
        .input-area { display: flex; gap: 5px; }
        .input-area input { flex-grow: 1; }
        .input-area button { width: auto; }
        pre { white-space: pre-wrap; word-wrap: break-word; background: #2d2d2d; padding: 10px; border-radius: 5px; border: 1px solid #444; font-family: monospace; }
    </style>
</head>
<body>

    <button class="key-btn" onclick="toggleSettings()">⚙️ Settings</button>

    <div id="settings">
        <label>Gemini API Key:</label>
        <input type="password" id="apiKey" placeholder="Paste key here...">
        <button onclick="saveKey()">💾 Save Key to Phone</button>
    </div>

    <div id="chat">
        <p><i>System: App ready. Memory is active.</i></p>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask me anything...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        // 1. Initialize our Conversation Memory array at the top
        let chatHistory = [];

        function toggleSettings() {
            const s = document.getElementById('settings');
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
        }

        function saveKey() {
            const key = document.getElementById('apiKey').value.trim();
            if(!key) return alert("Please enter a key");
            localStorage.setItem('gemini_api_key', key);
            alert("Key saved locally!");
            toggleSettings();
        }

        async function sendMessage() {
            const key = localStorage.getItem('gemini_api_key');
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            
            if (!key) {
                alert("Please save your API key in settings first!");
                return;
            }

            const message = input.value;
            if (!message) return;

            // 2. Add the User's message to our local memory
            chatHistory.push({
                role: "user",
                parts: [{ text: message }]
            });

            chat.innerHTML += `<p><b>You:</b> ${message}</p>`;
            input.value = "";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        // 3. Instead of one message, we send the whole history!
                        contents: chatHistory
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    chat.innerHTML += `<p style="color:orange"><b>API Error:</b> ${data.error.message}</p>`;
                } else {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    
                    // 4. Record the AI's response in our memory too
                    chatHistory.push({
                        role: "model",
                        parts: [{ text: aiResponse }]
                    });

                    chat.innerHTML += `<div><b>AI:</b><pre>${aiResponse}</pre></div>`;
                }
                
                chat.scrollTop = chat.scrollHeight;
            } catch (error) {
                chat.innerHTML += `<p style="color:red"><b>System Error:</b> Failed to connect.</p>`;
            }
        }
    </script>
</body>
</html>
