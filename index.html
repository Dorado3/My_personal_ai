<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal AI</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #chat { flex-grow: 1; overflow-y: auto; border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 12px; background: #1e1e1e; display: flex; flex-direction: column; gap: 10px; }
        #settings { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: none; border: 1px solid #444; }
        input, button { padding: 12px; border-radius: 8px; border: none; width: 100%; box-sizing: border-box; margin-top: 5px; font-size: 16px; transition: 0.3s; }
        input { background: #333; color: white; border: 1px solid #555; }
        input:focus { border-color: #007bff; outline: none; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #0056b3; }
        .key-btn { background: #444; margin-bottom: 10px; width: auto; align-self: flex-start; padding: 8px 15px; }
        .input-area { display: flex; gap: 8px; align-items: flex-end; }
        .input-area input { flex-grow: 1; }
        .input-area button { width: auto; padding: 12px 20px; }
        pre { white-space: pre-wrap; word-wrap: break-word; background: #2d2d2d; padding: 10px; border-radius: 8px; border: 1px solid #444; font-family: 'Courier New', Courier, monospace; margin: 5px 0; }
        
        /* Preparation for Bubbles */
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 15px; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #333; color: #e0e0e0; border-bottom-left-radius: 2px; }
    </style>
</head>
<body>

    <button class="key-btn" onclick="toggleSettings()">⚙️ Settings</button>

    <div id="settings">
        <label>Gemini API Key:</label>
        <input type="password" id="apiKey" placeholder="Paste key here...">
        <button onclick="saveKey()">💾 Save Key to Phone</button>
    </div>

    <div id="chat">
        <div class="ai-msg msg">System: Mirror Mode active. I will match your energy and length.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask me anything...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        let chatHistory = [];

        function toggleSettings() {
            const s = document.getElementById('settings');
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
        }

        function saveKey() {
            const key = document.getElementById('apiKey').value.trim();
            if(!key) return alert("Please enter a key");
            localStorage.setItem('gemini_api_key', key);
            alert("Key saved locally!");
            toggleSettings();
        }

        async function sendMessage() {
            const key = localStorage.getItem('gemini_api_key');
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            
            if (!key) {
                alert("Please save your API key in settings first!");
                return;
            }

            const message = input.value;
            if (!message) return;

            // Record User Message
            chatHistory.push({ role: "user", parts: [{ text: message }] });
            chat.innerHTML += `<div class="user-msg msg"><b>You:</b><br>${message}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        // SYSTEM INSTRUCTION: Sets the Mirror Personality
                        system_instruction: {
                            parts: [{ text: "You are a helpful, general-purpose all-in-one assistant similar to Claude or Gemini. You MUST use a 'Mirror Style': if the user is brief, you stay brief. If the user is detailed and curious, provide thorough, helpful explanations. Always match the user's tone and energy." }]
                        },
                        contents: chatHistory
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    chat.innerHTML += `<div class="ai-msg msg" style="color:orange"><b>API Error:</b> ${data.error.message}</div>`;
                } else {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    
                    // Record AI Message
                    chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });
                    chat.innerHTML += `<div class="ai-msg msg"><b>AI:</b><pre>${aiResponse}</pre></div>`;
                }
                
                chat.scrollTop = chat.scrollHeight;
            } catch (error) {
                chat.innerHTML += `<div class="ai-msg msg" style="color:red"><b>System Error:</b> Check connection.</div>`;
            }
        }
    </script>
</body>
</html>
