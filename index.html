<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal AI</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        
        #chat { flex-grow: 1; overflow-y: auto; padding: 15px; margin-bottom: 10px; border-radius: 12px; background: #1e1e1e; display: flex; flex-direction: column; gap: 15px; border: 1px solid #333; }

        /* Bubble Styles */
        .msg { max-width: 80%; padding: 10px 14px 25px 14px; border-radius: 18px; line-height: 1.4; font-size: 15px; position: relative; }
        .user-msg { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: #333; color: #e0e0e0; border-bottom-left-radius: 4px; }

        /* Timestamp Style */
        .timestamp { position: absolute; bottom: 5px; right: 12px; font-size: 10px; opacity: 0.6; font-weight: normal; }
        .ai-msg .timestamp { left: 12px; right: auto; }

        #settings { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: none; border: 1px solid #444; }
        input, button { padding: 12px; border-radius: 8px; border: none; width: 100%; box-sizing: border-box; font-size: 16px; }
        input { background: #333; color: white; border: 1px solid #555; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        .key-btn { background: #444; margin-bottom: 10px; width: auto; align-self: flex-start; padding: 8px 15px; }
        .input-area { display: flex; gap: 8px; }
        .input-area input { flex-grow: 1; }
        .input-area button { width: auto; }
    </style>
</head>
<body>

    <button class="key-btn" onclick="toggleSettings()">⚙️ Settings</button>

    <div id="settings">
        <label>Gemini API Key:</label>
        <input type="password" id="apiKey" placeholder="Paste key here...">
        <button onclick="saveKey()">💾 Save Key to Phone</button>
    </div>

    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        let chatHistory = [];

        function toggleSettings() {
            const s = document.getElementById('settings');
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
        }

        function saveKey() {
            const key = document.getElementById('apiKey').value.trim();
            if(!key) return;
            localStorage.setItem('gemini_api_key', key);
            alert("Key saved!");
            toggleSettings();
        }

        // Helper function to get current time and date
        function getTimestamp() {
            return new Date().toLocaleString([], { 
                month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
            });
        }

        async function sendMessage() {
            const key = localStorage.getItem('gemini_api_key');
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            if (!key || !input.value) return;

            const message = input.value;
            const time = getTimestamp();

            // 1. Add User Message to UI & History
            chatHistory.push({ role: "user", parts: [{ text: message }] });
            chat.innerHTML += `<div class="user-msg msg">${message}<span class="timestamp">${time}</span></div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        system_instruction: {
                            parts: [{ text: "You are a helpful assistant with a 'Mirror Style' personality. Match user length/energy. Vibe like Claude/Gemini." }]
                        },
                        contents: chatHistory
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                const aiTime = getTimestamp();

                // 2. Add AI Response to UI & History
                chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });
                chat.innerHTML += `<div class="ai-msg msg">${aiResponse}<span class="timestamp">${aiTime}</span></div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (e) {
                chat.innerHTML += `<div class="ai-msg msg">Error connecting...</div>`;
            }
        }
    </script>
</body>
</html>
