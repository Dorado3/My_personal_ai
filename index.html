<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 3 Flash Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 15px; margin-bottom: 10px; border-radius: 12px; background: #1e1e1e; display: flex; flex-direction: column; gap: 15px; border: 1px solid #333; }
        .msg { max-width: 80%; padding: 10px 14px 25px 14px; border-radius: 18px; line-height: 1.4; font-size: 15px; position: relative; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: #333; color: #e0e0e0; border-bottom-left-radius: 4px; }
        
        /* 🎨 Styles for Markdown Elements */
        .ai-msg p { margin: 5px 0; }
        .ai-msg ul, .ai-msg ol { padding-left: 20px; margin: 5px 0; }
        .ai-msg strong { color: #fff; }
        
        .timestamp { position: absolute; bottom: 5px; right: 12px; font-size: 10px; opacity: 0.6; }
        #preview-container { display: none; padding: 10px; background: #252525; border-radius: 8px; margin-bottom: 5px; position: relative; }
        #image-preview { max-height: 80px; border-radius: 5px; border: 1px solid #444; }
        .input-area { display: flex; gap: 8px; background: #252525; padding: 10px; border-radius: 8px; border: 1px solid #444; align-items: center; }
        input[type="text"] { flex-grow: 1; background: #333; color: white; border: 1px solid #555; padding: 10px; border-radius: 8px; outline: none; }
        #settings { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: none; border: 1px solid #444; }
        .icon-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #bbb; padding: 5px; }

        .spinner { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #sendBtn.loading .spinner { display: inline-block; }
        #sendBtn.loading .btn-text { display: none; }
    </style>
</head>
<body>

    <button onclick="toggleSettings()" style="background:#444; color:white; border:none; padding:8px; border-radius:5px; margin-bottom:10px; cursor:pointer;">⚙️ API Settings</button>

    <div id="settings">
        <label>Gemini 3 API Key:</label>
        <input type="password" id="geminiKey" style="width:100%; margin: 10px 0; background:#333; color:white; border:1px solid #555; padding:8px; border-radius:5px;">
        <button onclick="saveKey()" style="width:100%; background:#28a745; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Save Key</button>
    </div>

    <div id="chat"></div>

    <div id="preview-container">
        <img id="image-preview" src="">
        <button onclick="clearFile()" style="position:absolute; top:5px; right:5px; background:red; color:white; border:none; border-radius:50%; width:22px; height:22px; cursor:pointer;">×</button>
    </div>

    <div class="input-area">
        <input type="file" id="fileInput" style="display:none" accept="image/*" onchange="handleFileSelect(this)">
        <button type="button" class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="text" id="userInput" placeholder="Ask Gemini 3..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="sendBtn" onclick="sendMessage()" style="background:#007bff; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer; min-width:80px; display:flex; justify-content:center; align-items:center;">
            <span class="btn-text">Send</span>
            <div class="spinner"></div>
        </button>
    </div>

    <script>
        let chatHistory = [];
        let currentFile = null;
        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        function toggleSettings() {
            const s = document.getElementById('settings');
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
        }

        function saveKey() {
            localStorage.setItem('gemini_api_key', document.getElementById('geminiKey').value.trim());
            alert("Key updated!");
            toggleSettings();
        }

        function handleFileSelect(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentFile = { mimeType: file.type, data: e.target.result.split(',')[1] };
                    document.getElementById('image-preview').src = e.target.result;
                    document.getElementById('preview-container').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function clearFile() {
            currentFile = null;
            document.getElementById('fileInput').value = "";
            document.getElementById('preview-container').style.display = 'none';
        }

        async function sendMessage() {
            const key = localStorage.getItem('gemini_api_key');
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const text = input.value;
            
            if (!text && !currentFile) return;
            if (!key) return alert("Enter your API key in Settings first!");

            btn.classList.add('loading');
            btn.disabled = true;

            const chat = document.getElementById('chat');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            chat.innerHTML += `<div class="user-msg msg">${text || "[Image]"}<span class="timestamp">${time}</span></div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            let parts = [{ text: text || "Analyze this image" }];
            if (currentFile) {
                parts.push({ inline_data: { mime_type: currentFile.mimeType, data: currentFile.data } });
                clearFile();
            }

            chatHistory.push({ role: "user", parts: parts });

            let success = false;
            let attempts = 0;
            const maxAttempts = 3;

            while (attempts < maxAttempts && !success) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: chatHistory })
                    });

                    const data = await response.json();

                    if (response.status === 429) {
                        attempts++;
                        await sleep(5000 * attempts);
                        continue; 
                    }

                    if (data.error) throw new Error(data.error.message);

                    const aiText = data.candidates[0].content.parts[0].text;
                    chatHistory.push({ role: "model", parts: [{ text: aiText }] });
                    
                    // ✨ Using marked.parse() to render the AI text
                    chat.innerHTML += `<div class="ai-msg msg">${marked.parse(aiText)}<span class="timestamp">${time}</span></div>`;
                    success = true;
                } catch (e) {
                    if (attempts >= maxAttempts - 1) {
                        chat.innerHTML += `<div class="ai-msg msg" style="color:#ff6b6b">Error: ${e.message}</div>`;
                    }
                    attempts++;
                }
            }

            btn.classList.remove('loading');
            btn.disabled = false;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
