<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal AI</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #chat { flex-grow: 1; overflow-y: auto; border: 1px solid #333; padding: 10px; margin-bottom: 10px; border-radius: 8px; background: #1e1e1e; }
        #settings { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: none; border: 1px solid #444; }
        input, button { padding: 12px; border-radius: 5px; border: none; width: 100%; box-sizing: border-box; margin-top: 5px; font-size: 16px; }
        input { background: #333; color: white; border: 1px solid #555; }
        button { background: #007bff; color: white; font-weight: bold; }
        .key-btn { background: #444; margin-bottom: 10px; width: auto; align-self: flex-start; padding: 8px 15px; }
        .input-area { display: flex; gap: 5px; }
        .input-area input { flex-grow: 1; }
        .input-area button { width: auto; }
        pre { white-space: pre-wrap; word-wrap: break-word; background: #2d2d2d; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <button class="key-btn" onclick="toggleSettings()">⚙️ Settings</button>

    <div id="settings">
        <label>Gemini API Key:</label>
        <input type="password" id="apiKey" placeholder="Paste key here...">
        <button onclick="saveKey()">💾 Save Key to Phone</button>
    </div>

    <div id="chat">
        <p><i>System: App ready. Open settings to save your key.</i></p>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask me to write code...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        function toggleSettings() {
            const s = document.getElementById('settings');
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
        }

        function saveKey() {
            const key = document.getElementById('apiKey').value.trim();
            if(!key) return alert("Please enter a key");
            localStorage.setItem('gemini_api_key', key);
            alert("Key saved locally!");
            toggleSettings();
        }

        async function sendMessage() {
            const key = localStorage.getItem('gemini_api_key');
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            
            if (!key) {
                alert("Please save your API key in settings first!");
                return;
            }

            const message = input.value;
            if (!message) return;

            chat.innerHTML += `<p><b>You:</b> ${message}</p>`;
            input.value = "";

            try {
                // Updated URL to the stable v1 endpoint
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: message }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    chat.innerHTML += `<p style="color:orange"><b>API Error:</b> ${data.error.message}</p>`;
                } else {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += `<div><b>AI:</b><pre>${aiResponse}</pre></div>`;
                }
                
                chat.scrollTop = chat.scrollHeight;
            } catch (error) {
                chat.innerHTML += `<p style="color:red"><b>System Error:</b> Failed to connect. Check internet.</p>`;
            }
        }
    </script>
</body>
</html>
